    <path d="M40 60 L62 78 L52 104 L78 96"/>
    <path d="M62 78 L86 68"/>
    <path d="M52 104 L38 86"/>
    <path d="M40 60 L38 86"/>
  </g>
  <g fill="#ffffff">
