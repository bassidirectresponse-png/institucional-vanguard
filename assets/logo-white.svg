  <text x="173" y="147" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.6" font-weight="600" letter-spacing="1.1" fill="#ffffff">DIRECT RESPONSE • INFOSAAS • GLOBAL</text>
