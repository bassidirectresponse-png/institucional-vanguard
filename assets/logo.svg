<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" role="img" aria-label="Vanguard Group">
  <defs>
    <linearGradient id="vg" x1="0" y1="0.1" x2="0.9" y2="1">
      <stop offset="0" stop-color="#5BE988"/>
      <stop offset="0.55" stop-color="#2BB14B"/>
      <stop offset="1" stop-color="#1E8A45"/>
    </linearGradient>
  </defs>

  <!-- low-poly network (left wing) -->
  <g stroke="url(#vg)" stroke-width="1.5" fill="none" opacity=".9" stroke-linecap="round">
    <path d="M42 60 L60 52 L54 80 Z"/>
    <path d="M60 52 L68 72 L54 80"/>
    <path d="M42 60 L54 80 L40 86"/>
    <path d="M54 80 L58 104 L40 86"/>
    <path d="M58 104 L78 92 L68 72"/>
  </g>
  <g fill="url(#vg)">
    <circle cx="42" cy="60" r="3.6"/>
    <circle cx="60" cy="52" r="3"/>
    <circle cx="68" cy="72" r="4"/>
    <circle cx="54" cy="80" r="3"/>
    <circle cx="40" cy="86" r="2.6"/>
    <circle cx="58" cy="104" r="3.2"/>
    <circle cx="78" cy="92" r="2.6"/>
  </g>

  <!-- V silhouette -->
  <path d="M26 36 L78 128 L130 36" fill="none" stroke="url(#vg)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- upward arrow on the right -->
  <g fill="none" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M86 98 L122 40"/>
    <path d="M103 40 L123 35 L118 55"/>
  </g>

  <!-- wordmark (textLength locks width so it never clips) -->
  <text x="168" y="72" textLength="252" lengthAdjust="spacingAndGlyphs"
    font-family="'Space Grotesk','Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#10180F">VANGUARD</text>
  <text x="170" y="114" textLength="248" lengthAdjust="spacingAndGlyphs"
    font-family="'Space Grotesk','Segoe UI',Arial,sans-serif" font-size="34" font-weight="500" fill="#10180F">GROUP</text>
  <rect x="170" y="123" width="248" height="3.2" rx="1.6" fill="#1E8A45"/>
  <text x="170" y="143" textLength="248" lengthAdjust="spacingAndGlyphs"
    font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="600" fill="#1E8A45">DIRECT RESPONSE • INFOSAAS • GLOBAL</text>
</svg>
